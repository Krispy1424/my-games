<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub | Unblocked Games</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --accent: #6c5ce7;
            --text: #ffffff;
            --text-muted: #a0a0b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text);
            overflow-x: hidden;
        }

        header {
            background-color: var(--bg-secondary);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-bar {
            padding: 10px 20px;
            width: 300px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: var(--bg-primary);
            color: var(--text);
            outline: none;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid-title {
            font-size: 28px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            padding-left: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .game-card {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2a2a40;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        .game-thumbnail {
            width: 100%;
            height: 150px;
            background-color: #2e2e4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            object-fit: cover;
        }

        .game-info {
            padding: 15px;
        }

        .game-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .game-tag {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Modal / Game Player View */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .player-container {
            width: 80%;
            height: 80%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.5);
        }

        .player-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close-btn:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🕹️ ArcadeHub</div>
        <input type="text" class="search-bar" id="search" placeholder="Search unblocked games..." oninput="filterGames()">
    </header>

    <div class="container">
        <h2 class="grid-title">Featured Games</h2>
        <div class="game-grid" id="gameGrid">
            <!-- Games will be loaded here dynamically by JavaScript -->
        </div>
    </div>

    <!-- Game Player Modal -->
    <div class="player-modal" id="playerModal">
        <div class="player-container">
            <button class="close-btn" onclick="closeGame()">&times; Close Game</button>
            <iframe class="player-frame" id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // List of games. Replace URLs with functional HTML5 open-source embeds.
        const games = [
            {
                name: "Roblox Web",
                tag: "Multiplayer",
                icon: "🟥",
                // Note: Standard roblox.com blocks direct iframe embedding. 
                // You must link to an unblocked proxy mirror or a cloud gaming provider (e.g. Now.gg embed).
                url: "https://now.gg" 
            },
            {
                name: "Retro Space Invaders",
                tag: "HTML5 Retro",
                icon: "🚀",
                url: "https://gpro.co"
            },
            {
                name: "2048 Puzzle",
                tag: "HTML5 Logic",
                icon: "🧩",
                url: "https://play2048.co"
            },
            {
                name: "Tetris Classic",
                tag: "HTML5 Puzzle",
                icon: "🧱",
                url: "https://github.io"
            }
        ];

        function displayGames(gamesList) {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            
            gamesList.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => openGame(game.url);
                
                card.innerHTML = `
                    <div class="game-thumbnail">${game.icon}</div>
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-tag">${game.tag}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterGames() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = games.filter(game => game.name.toLowerCase().includes(query));
            displayGames(filtered);
        }

        function openGame(url) {
            document.getElementById('gameFrame').src = url;
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closeGame() {
            document.getElementById('gameFrame').src = '';
            document.getElementById('playerModal').style.display = 'none';
        }

        // Initial render
        displayGames(games);
    </script>
</body>
</html>
